[env:wbmge]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters =
    direct
    colorize
    esp32_exception_decoder
board_build.filesystem = littlefs
board_build.flash_mode = dio
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ArduinoJSON
    FS
    https://github.com/lan143/ed-mqtt
    https://github.com/lan143/ed-config
    https://github.com/lan143/ed-utils
    https://github.com/lan143/ed-ha
    https://github.com/lan143/ed-healthcheck
    https://github.com/lan143/ed-wb
    https://github.com/lan143/ed-network
    TCA9555
    https://github.com/lan143/ed-common
    FastLED
build_flags=
    -Wshadow
    -DCORE_DEBUG_LEVEL=5
    -DCONFIG_LOG_COLORS=1
    -frtti

build_unflags =
    -fno-rtti

[env:wbmge_ota]
extends = env:wbmge
upload_protocol = espota
upload_port = 192.168.1.48
upload_flags = --auth=somestrongpassword 
